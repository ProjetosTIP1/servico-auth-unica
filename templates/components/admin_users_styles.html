<style>
    :root {
        --primary: #fffcff;
        --inverted: #28282b;
        --secondary: #f2f2f2;
        --tertiary: #96e6b3;
        --surface: #efefef;
        --text: #0d2818;
        --border: #627264;
        --accent: #627264;
        --glass: rgba(140, 175, 156, 0.3);
        --red: #ef3054;
        --radius: 8px;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Chivo', sans-serif;
    }

    body {
        background-color: var(--primary);
        color: var(--text);
        display: flex;
        min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
        width: 260px;
        background: var(--inverted);
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
        position: fixed;
        height: 100vh;
        z-index: 100;
    }

    .logo {
        font-size: 1.25rem;
        font-weight: 900;
        margin-bottom: 3rem;
        color: var(--tertiary);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo-box {
        width: 32px;
        height: 32px;
        background: var(--tertiary);
        color: var(--inverted);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
    }

    .nav-item {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        color: #a1a1aa;
        text-decoration: none;
        margin-bottom: 0.25rem;
        transition: all 0.3s ease;
        font-weight: 500;
        font-size: 0.9375rem;
    }

    .nav-item:hover, .nav-item.active {
        background: rgba(150, 230, 179, 0.1);
        color: var(--tertiary);
    }

    .nav-item svg {
        margin-right: 12px;
        width: 18px;
        height: 18px;
    }

    /* Main Content */
    .main {
        flex: 1;
        margin-left: 260px;
        padding: 2.5rem;
        background: var(--primary);
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--secondary);
    }

    .header-title h1 {
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.02em;
    }

    .header-actions {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    /* Search Bar */
    .search-container {
        position: relative;
        width: 320px;
    }

    .search-container input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        border: 1px solid var(--tertiary);
        border-radius: var(--radius);
        font-size: 0.875rem;
        outline: none;
        transition: all 0.2s;
        background: white;
    }

    .search-container input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(150, 230, 179, 0.1);
    }

    .search-container svg {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        pointer-events: none;
    }

    .btn-sync {
        background: var(--inverted);
        color: var(--tertiary);
        padding: 0.75rem 1.25rem;
        border-radius: var(--radius);
        font-weight: 700;
        border: 1px solid var(--tertiary);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s;
        font-size: 0.875rem;
    }

    .btn-sync:hover {
        background: var(--tertiary);
        color: var(--inverted);
    }

    .btn-sync:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .btn-sync.syncing svg {
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Table */
    .table-container {
        background: white;
        border-radius: var(--radius);
        border: 1px solid var(--secondary);
        overflow: hidden;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
    }

    th {
        background: var(--surface);
        padding: 1rem;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent);
    }

    td {
        padding: 1rem;
        border-bottom: 1px solid var(--secondary);
        font-size: 0.9375rem;
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--surface);
        color: var(--inverted);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 0.875rem;
        border: 1px solid var(--secondary);
    }

    .user-details .name {
        font-weight: 700;
        color: var(--text);
        font-size: 0.9375rem;
    }

    .user-details .username {
        font-size: 0.75rem;
        color: var(--accent);
        font-family: 'IBM Plex Mono', monospace;
    }

    .mono {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.8125rem;
        color: var(--accent);
    }

    .badge-source {
        font-size: 0.6875rem;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 800;
        text-transform: uppercase;
    }

    .source-sga {
        background-color: #DBEAFE;
        color: #1E40AF;
    }

    .source-local {
        background-color: #ECFDF5;
        color: #065F46;
    }

    .status-active {
        color: #16a34a;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .status-active::before {
        content: "";
        width: 6px;
        height: 6px;
        background: #16a34a;
        border-radius: 50%;
    }

    .actions {
        display: flex;
        gap: 10px;
    }

    .btn-action {
        padding: 6px;
        border-radius: 6px;
        border: 1px solid var(--secondary);
        background: white;
        cursor: pointer;
        color: var(--accent);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-action:hover {
        border-color: var(--tertiary);
        color: var(--text);
        background: var(--surface);
    }

    /* Modal */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(13, 40, 24, 0.4);
        backdrop-filter: blur(4px);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
    }

    .modal {
        background: white;
        width: 100%;
        max-width: 800px;
        max-height: 90vh;
        border-radius: 12px;
        overflow-y: auto;
        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }

    .modal-header {
        padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--secondary);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-header h2 {
        font-weight: 800;
        font-size: 1.25rem;
    }

    .modal-body {
        padding: 2rem;
    }

    .section-title {
        font-size: 0.875rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }

    .form-group {
        margin-bottom: 0.5rem;
    }

    .form-group label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: var(--accent);
    }

    .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--tertiary);
        border-radius: var(--radius);
        outline: none;
        font-size: 0.9375rem;
        transition: all 0.2s;
    }

    .form-group input:focus {
        border-color: var(--accent);
    }

    .form-group input:disabled {
        background: var(--surface);
        cursor: not-allowed;
        border-color: var(--secondary);
    }

    .apps-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .app-item {
        padding: 1rem;
        border: 1px solid var(--secondary);
        border-radius: var(--radius);
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s;
    }

    .app-item:hover {
        border-color: var(--tertiary);
        background: var(--surface);
    }

    .app-name {
        font-weight: 700;
        font-size: 0.9375rem;
    }

    .app-uri {
        font-size: 0.75rem;
        color: var(--accent);
        font-family: 'IBM Plex Mono', monospace;
    }

    .app-perms {
        display: flex;
        gap: 12px;
    }

    .perm-checkbox {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8125rem;
        font-weight: 600;
        cursor: pointer;
        color: var(--accent);
    }

    .perm-checkbox input {
        cursor: pointer;
    }

    .modal-footer {
        padding: 1.5rem 2rem;
        border-top: 1px solid var(--secondary);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        background: var(--surface);
    }

    .btn-save {
        background: var(--tertiary);
        color: var(--text);
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius);
        border: none;
        cursor: pointer;
        font-weight: 700;
        transition: all 0.2s;
    }

    .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(150, 230, 179, 0.3);
    }
</style>
