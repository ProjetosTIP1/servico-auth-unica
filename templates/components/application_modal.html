<div id="appModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Nova Aplicação</h2>
        </div>
        <form id="appForm">
            <input type="hidden" id="app_id">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="name" required placeholder="e.g. Finance Dashboard">
            </div>
            <div class="form-group">
                <label>URI</label>
                <input type="text" id="uri" required placeholder="https://app.yourdomain.com">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="type" required>
                    <option value="all">Público (Todos os Usuários)</option>
                    <option value="restricted">Restrito (Link Manual)</option>
                    <option value="internal">Apenas Interno</option>
                    <option value="external">Apenas Externo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <textarea id="description" rows="3" placeholder="Breve descrição da aplicação..."></textarea>
            </div>
            <div class="form-group">
                <label>Permissões (separadas por vírgula)</label>
                <input type="text" id="permissions" placeholder="read, write, admin">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn-save">Salvar Aplicação</button>
            </div>
        </form>
    </div>
</div>
